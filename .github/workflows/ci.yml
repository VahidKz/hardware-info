name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Qt ${{ matrix.qt }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - qt: 5
            package: qtbase5-dev
          - qt: 6
            package: qt6-base-dev

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        run: |
          sudo apt-get update
          sudo apt-get install --yes "${{ matrix.package }}"

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build --config Release --parallel 2

      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure

      - name: Verify installation
        run: cmake --install build --prefix "${{ runner.temp }}/hardware-info"
